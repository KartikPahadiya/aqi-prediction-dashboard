name: Daily AQI Pipeline + Deploy

on:
  schedule:
    - cron: '30 1 * * *'  # 1:30 UTC = 7:00 AM IST
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas scikit-learn requests
      
      - name: Fetch AQI data
        run: python data_pipeline/fetch_aqi.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
        continue-on-error: true
      
      - name: Preprocess data
        run: python data_pipeline/preprocess.py
      
      - name: Train models
        run: python data_pipeline/train_models.py
      
      - name: Generate precomputed cache
        run: python backend/precompute.py
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add backend/data/
          git add backend/models/
          git diff --staged --quiet || (git commit -m "Auto: daily update $(date +%Y-%m-%d)" && git push)
